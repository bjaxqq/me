<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Journal — Brooks Jackson</title>

    <meta name="description" content="Notes and writing from Brooks Jackson.">
    <meta name="theme-color" content="#f4f1ea">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <meta property="og:title" content="Journal — Brooks Jackson">
    <meta property="og:description" content="Notes and writing.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap">
    <link rel="stylesheet" href="/css/broadsheet.css">
    <link rel="stylesheet" href="/css/journal.css">

    <script>
        document.documentElement.classList.add('js');

        try {
            var t = localStorage.getItem('edition');

            if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
    </script>
</head>
<body>

<a class="skip" href="#archive">Skip to the archive</a>

<header class="jhead sheet">
    <div class="rule rule--soft" data-reveal="rule"></div>

    <div class="jhead__bar">
        <a href="/" class="jhead__back link">&larr; Brooks Jackson</a>

        <button class="theme-toggle" type="button" data-theme-toggle>Dark</button>
    </div>

    <div class="rule rule--hard" data-reveal="rule" style="--delay:100ms"></div>

    <h1 class="jhead__title">
        <span class="rise" data-fit data-reveal="rise" style="--delay:200ms"><span><em>Journal</em><span class="jhead__dot">.</span></span></span>
    </h1>

    <div class="rule rule--double" data-reveal="rule" style="--delay:420ms"></div>

    <div class="jhead__meta" data-reveal style="--delay:540ms">
        <span class="agate"><span id="jcount">&mdash;</span> entries &middot; newest first</span>
        <span class="agate agate--faint" id="jdate">&mdash;</span>
    </div>
</header>

<main class="sheet" id="archive">
    <div id="archive-body">
        <p class="agate agate--faint" style="padding-block:4rem">Fetching the archive&hellip;</p>
    </div>
</main>

<footer class="sheet">
    <div class="rule rule--hard"></div>

    <div class="colophon">
        <div class="agate agate--faint">Brooks Jackson</div>

        <nav class="colophon__links" aria-label="Links">
            <a href="/" class="link">Home</a>
            <a href="https://github.com/bjaxqq" class="link" target="_blank" rel="me noopener">GitHub</a>
            <a href="mailto:contact@brooksjackson.me" class="link">Contact</a>
        </nav>
    </div>
</footer>

<script src="/js/vendor/lenis.min.js"></script>

<script type="module" src="/js/journal.js"></script>

</body>
</html>
