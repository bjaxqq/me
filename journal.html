<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Journal — Brooks Jackson</title>

    <meta name="description" content="Notes and writing from Brooks Jackson.">
    <meta name="theme-color" content="#f4f1ea">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <meta property="og:title" content="Journal — Brooks Jackson">
    <meta property="og:description" content="Notes and writing.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap">
    <link rel="stylesheet" href="/css/broadsheet.css">
    <link rel="stylesheet" href="/css/journal.css">

    <script>
        document.documentElement.classList.add('js');

        try {
            var t = localStorage.getItem('edition');

            if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
    </script>
</head>
<body>

<a class="skip" href="#archive">Skip to the archive</a>

<div class="sectionbar" id="sectionbar">
    <div class="sheet sectionbar__inner">
        <a href="/" class="sectionbar__name">Brooks Jackson</a>

        <nav class="sectionbar__nav" aria-label="Sections">
            <a href="/#lead">About</a>
            <a href="/#index">Stats</a>
            <a href="#archive" aria-current="true">Journal</a>
        </nav>

        <div class="sectionbar__end">
            <span class="agate agate--faint sectionbar__date" data-current-date>&mdash;</span>
            <button class="theme-toggle" type="button" data-theme-toggle>Dark</button>
        </div>
    </div>
</div>

<header class="jhead sheet">
    <div class="rule rule--soft" data-reveal="rule"></div>

    <div class="dateline agate">
        <a href="/" class="dateline__back link">&larr;&nbsp;Brooks&nbsp;Jackson</a>
        <span class="dateline__mid" data-current-date>&mdash;</span>
        <button class="theme-toggle" type="button" data-theme-toggle>Dark</button>
    </div>

    <div class="rule rule--hard" data-reveal="rule" style="--delay:120ms"></div>

    <h1 class="wordmark">
        <span class="rise" data-fit data-reveal="rise" style="--delay:220ms"><span>Journal<span class="wordmark__dot">.</span></span></span>
    </h1>

    <div class="rule rule--double" data-reveal="rule" style="--delay:520ms"></div>

    <div class="masthead__foot chrome-handoff">
        <p class="masthead__strap" data-reveal style="--delay:640ms">
            My thoughts and notes.
        </p>

        <div class="masthead__end" data-reveal style="--delay:720ms">
            <span><span id="jcount">&mdash;</span> entries</span>

            <nav class="jsort" aria-label="Sort entries">
                <button type="button" data-sort="newest" aria-current="true">Newest</button>
                <span aria-hidden="true">&middot;</span>
                <button type="button" data-sort="oldest">Oldest</button>
            </nav>
        </div>
    </div>

    <div class="rule" data-reveal="rule" style="--delay:800ms"></div>
</header>

<main class="sheet" id="archive">
    <div id="archive-body">
        <p class="agate agate--faint" style="padding-block:4rem">Fetching the archive&hellip;</p>
    </div>
</main>

<footer class="sheet">
    <div class="rule rule--hard"></div>

    <div class="colophon">
        <div>
            <div class="agate" style="margin-bottom:0.4rem">Brooks Jackson &middot; bjaxqq</div>

            <div class="agate agate--faint">
                Set in Instrument Serif, Newsreader &amp; IBM&nbsp;Plex&nbsp;Mono.
                Journal updated <span id="generated">&mdash;</span>.
            </div>
        </div>

        <nav class="colophon__links" aria-label="Links">
            <a href="https://github.com/bjaxqq" class="link" target="_blank" rel="me noopener">Work</a>
            <a href="mailto:contact@brooksjackson.me" class="link">Contact</a>
        </nav>
    </div>
</footer>

<script src="/js/vendor/lenis.min.js"></script>

<script type="module" src="/js/journal.js"></script>

</body>
</html>
