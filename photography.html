    <style>
        :root {
            --bg: #ffffff;
            --ink: #1a1a1a;
            --ink-muted: #8c8c8c;
            --transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: "Newsreader", serif;
            font-style: normal;
            -webkit-font-smoothing: antialiased;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards;
            transition: opacity 0.5s ease;
        }

        .canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .gallery-img {
            position: absolute;
            top: 50%;
            left: 50%;
            max-width: 70vw; 
            max-height: 70vh;
            object-fit: contain;
            display: block;
            pointer-events: none;
            transition: opacity var(--transition), transform var(--transition);
            will-change: transform, opacity;
            opacity: 0;
            transform: translate(-50%, -50%);
        }

        .no-transition {
            transition: none !important;
        }

        .view-active { 
            opacity: 1; 
            transform: translate(-50%, -50%); 
        }
        
        .view-left { 
            opacity: 0; 
            transform: translate(calc(-50% - 60px), -50%); 
        }
        
        .view-right { 
            opacity: 0; 
            transform: translate(calc(-50% + 60px), -50%); 
        }

        .bottom-controls {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            z-index: 20;
        }

        .project-link {
            font-size: 32px;
            font-weight: 300;
            font-style: normal;
            color: var(--ink);
            position: relative;
            transition: color 0.4s ease;
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
            padding: 0;
            text-decoration: none;
        }

        .project-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: var(--ink-muted);
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .project-link:hover {
            color: var(--ink-muted);
        }

        .project-link:hover::after {
            width: 100%;
        }

        #close-btn {
            position: fixed;
            top: 40px;
            right: 40px;
            z-index: 40;
        }

        .nav-zone {
            position: fixed;
            top: 0;
            height: 100%;
            width: 30%;
            z-index: 5;
            cursor: pointer;
        }
        
        .nav-left { left: 0; }
        .nav-right { right: 0; }

        .exit-trigger {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40%;
            height: 50%;
            z-index: 30;
            cursor: default;
        }

        @media (max-width: 768px) {
            .gallery-img {
                max-width: 85vw;
                max-height: 80vh;
            }
            .bottom-controls {
                bottom: 24px;
                gap: 24px;
            }
            .project-link {
                font-size: 24px;
            }
            #close-btn {
                top: 24px;
                right: 24px;
            }
        }
    </style>
</head>

        library.sort((a, b) => new Date(b.date) - new Date(a.date));

        const imgs = [document.getElementById('img-1'), document.getElementById('img-2')];
        let activeIdx = 0; 
        let currentPhotoIdx = 0; 
        let isTransitioning = false;
        let touchStartX = 0;
        let touchEndX = 0;

        function exitGallery(e) {
            if (e) e.preventDefault();
            document.body.style.opacity = '0';
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 500);
        }

        function preloadImages(idx) {
            const nextIdx = (idx + 1) % library.length;
            const prevIdx = (idx - 1 + library.length) % library.length;
            new Image().src = library[nextIdx].url;
            new Image().src = library[prevIdx].url;
        }

        function updateGallery(newPhotoIdx, direction = 'next') {
            if (isTransitioning) return;
            isTransitioning = true;

            const nextImgIdx = 1 - activeIdx;
            const currentImg = imgs[activeIdx];
            const nextImg = imgs[nextImgIdx];
            const photo = library[newPhotoIdx];

            nextImg.className = `gallery-img no-transition ${direction === 'next' ? 'view-right' : 'view-left'}`;
            nextImg.src = photo.url;

            void nextImg.offsetWidth;
            
            nextImg.classList.remove('no-transition');
            currentImg.className = `gallery-img ${direction === 'next' ? 'view-left' : 'view-right'}`;
            nextImg.className = 'gallery-img view-active';
            
            setTimeout(() => {
                activeIdx = nextImgIdx;
                isTransitioning = false;
                preloadImages(newPhotoIdx);
            }, 600);
        }

        const goNext = () => {
            if (isTransitioning) return;
            currentPhotoIdx = (currentPhotoIdx + 1) % library.length;
            updateGallery(currentPhotoIdx, 'next');
        };

        const goPrev = () => {
            if (isTransitioning) return;
            currentPhotoIdx = (currentPhotoIdx - 1 + library.length) % library.length;
            updateGallery(currentPhotoIdx, 'prev');
        };

        const handleSwipe = () => {
            const threshold = 50;
            if (touchEndX < touchStartX - threshold) goNext();
            if (touchEndX > touchStartX + threshold) goPrev();
        };

        document.getElementById('close-btn').addEventListener('click', exitGallery);
        document.getElementById('center-exit').addEventListener('click', exitGallery);
        document.getElementById('next-zone').addEventListener('click', goNext);
        document.getElementById('prev-zone').addEventListener('click', goPrev);
        document.getElementById('btn-next').addEventListener('click', goNext);
        document.getElementById('btn-prev').addEventListener('click', goPrev);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') goNext();
            if (e.key === 'ArrowLeft') goPrev();
            if (e.key === 'Escape' || e.key === 'Esc') exitGallery();
        });

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        const first = library[0];
        imgs[0].src = first.url;
        imgs[0].className = 'gallery-img view-active';
        preloadImages(0);
